<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Hunter - Multi-Language Code Debugger</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-active: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --shadow: 0 12px 32px rgba(0,0,0,0.6);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(31, 111, 235, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 148, 158, 0.03) 0px, transparent 50%);
        }

        .welcome-container {
            max-width: 900px;
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 16px;
            color: var(--accent-blue);
            box-shadow: var(--shadow);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #e6edf3 30%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 500px;
            font-weight: 450;
        }

        /* Language Grid Layout */
        .language-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            width: 100%;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .language-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .language-grid {
                grid-template-columns: 1fr;
            }
        }

        .lang-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem 1.5rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .lang-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--lang-color);
            opacity: 0.6;
            transition: var(--transition);
        }

        /* Language specific colors */
        .lang-python { --lang-color: #3776AB; }
        .lang-javascript { --lang-color: #F7DF1E; }
        .lang-java { --lang-color: #007396; }
        .lang-cpp { --lang-color: #00599C; }
        .lang-go { --lang-color: #00ADD8; }
        .lang-rust { --lang-color: #DEA584; }

        .lang-icon {
            font-size: 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            filter: grayscale(20%);
        }

        .lang-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition);
        }

        /* Hover states */
        .lang-card:hover {
            transform: translateY(-5px);
            border-color: var(--lang-color);
            background-color: var(--bg-active);
            box-shadow: 0 8px 24px var(--shadow-color);
        }

        .lang-card:hover::before {
            opacity: 1;
            height: 6px;
        }

        .lang-card:hover .lang-icon {
            transform: scale(1.15);
            filter: grayscale(0%);
        }

        .lang-card:hover .lang-name {
            color: #ffffff;
        }

        /* Shadow glow variables */
        .lang-python:hover { --shadow-color: rgba(55, 118, 171, 0.15); }
        .lang-javascript:hover { --shadow-color: rgba(247, 223, 30, 0.1); }
        .lang-java:hover { --shadow-color: rgba(0, 115, 150, 0.15); }
        .lang-cpp:hover { --shadow-color: rgba(0, 89, 156, 0.15); }
        .lang-go:hover { --shadow-color: rgba(0, 173, 216, 0.15); }
        .lang-rust:hover { --shadow-color: rgba(222, 165, 132, 0.15); }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        footer svg {
            color: var(--accent-blue);
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background-color: #0d1117;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="welcome-container">
        <header>
            <div class="logo-badge">
                <i data-lucide="bug" size="36"></i>
            </div>
            <h1>Welcome to Bug Hunter</h1>
            <p class="subtitle">Select a programming language to start scanning, debugging, and optimizing your code with AI.</p>
        </header>

        <div class="language-grid">
            <a href="/debug?lang=python" class="lang-card lang-python">
                <div class="lang-icon">🐍</div>
                <div class="lang-name">Python</div>
            </a>
            
            <a href="/debug?lang=javascript" class="lang-card lang-javascript">
                <div class="lang-icon">🟨</div>
                <div class="lang-name">JavaScript</div>
            </a>

            <a href="/debug?lang=java" class="lang-card lang-java">
                <div class="lang-icon">☕</div>
                <div class="lang-name">Java</div>
            </a>

            <a href="/debug?lang=cpp" class="lang-card lang-cpp">
                <div class="lang-icon">🔵</div>
                <div class="lang-name">C++</div>
            </a>

            <a href="/debug?lang=go" class="lang-card lang-go">
                <div class="lang-icon">🐹</div>
                <div class="lang-name">Go</div>
            </a>

            <a href="/debug?lang=rust" class="lang-card lang-rust">
                <div class="lang-icon">🦀</div>
                <div class="lang-name">Rust</div>
            </a>
        </div>

        <footer>
            Powered by Google Gemini API
        </footer>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Starfield Animation
        (function() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;
            
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });
            
            class Star {
                constructor() {
                    this.reset();
                    // Pre-populate random locations initially
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                }
                
                reset() {
                    this.x = Math.random() * width;
                    this.y = height + 10;
                    this.size = Math.random() * 1.2 + 0.4;
                    this.speed = Math.random() * 0.12 + 0.04;
                    this.alpha = Math.random() * 0.5 + 0.15;
                    this.glowSpeed = Math.random() * 0.015 + 0.005;
                    this.glowDirection = Math.random() > 0.5 ? 1 : -1;
                    this.color = Math.random() > 0.85 ? 'rgba(88, 166, 255, ' : 'rgba(230, 237, 243, ';
                }
                
                update() {
                    this.y -= this.speed;
                    
                    this.alpha += this.glowSpeed * this.glowDirection;
                    if (this.alpha >= 0.7) {
                        this.alpha = 0.7;
                        this.glowDirection = -1;
                    } else if (this.alpha <= 0.15) {
                        this.alpha = 0.15;
                        this.glowDirection = 1;
                    }
                    
                    if (this.y < -10) {
                        this.reset();
                        this.y = height + 10;
                    }
                }
                
                draw() {
                    ctx.fillStyle = this.color + this.alpha + ')';
                    ctx.shadowBlur = this.size > 1.0 ? 3 : 0;
                    ctx.shadowColor = 'rgba(88, 166, 255, 0.4)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            const numStars = 60; // 60 stars is lightweight and has excellent FPS
            const stars = Array.from({ length: numStars }, () => new Star());
            
            function animate() {
                ctx.fillStyle = '#0d1117';
                ctx.fillRect(0, 0, width, height);
                
                // Background radial gradients for ambient glow
                const grad1 = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, Math.max(width, height));
                grad1.addColorStop(0, 'rgba(31, 111, 235, 0.05)');
                grad1.addColorStop(1, 'transparent');
                ctx.fillStyle = grad1;
                ctx.fillRect(0, 0, width, height);
                
                ctx.shadowBlur = 0;
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
        })();
    </script>

    <!-- Chasing Bug Cursor Feature -->
    <div class="chasing-bug" id="chasing-bug" style="position: fixed; top: 0; left: 0; width: 24px; height: 24px; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); will-change: transform; transition: opacity 0.3s ease; opacity: 0; display: flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bug" style="filter: drop-shadow(0 0 3px rgba(88,166,255,0.4));"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-4.97 0-9-4.03-9-9 0-4.02 3.24-7.3 7.29-7.97Q11 3 12 3q1 0 1.71.03C17.76 3.7 21 6.98 21 11c0 4.97-4.03 9-9 9Z"/><path d="M12 9v11"/><path d="M18.39 8.81 21.6 7"/><path d="M21 11h-3"/><path d="M18.39 13.19 21.6 15"/><path d="M5.61 8.81 2.4 7"/><path d="M3 11h3"/><path d="M5.61 13.19 2.4 15"/></svg>
    </div>
    
    <script>
        (function() {
            const bug = document.getElementById('chasing-bug');
            let mouseX = 0, mouseY = 0;
            let bugX = 0, bugY = 0;
            let hasMoved = false;
            
            // Chasing speed (0.08 is smooth and creates a nice trailing lag)
            const speed = 0.08;
            
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                if (!hasMoved) {
                    // Position immediately on first move to prevent bug flying from top-left (0,0)
                    bugX = mouseX;
                    bugY = mouseY;
                    bug.style.opacity = '1';
                    hasMoved = true;
                }
            });
            
            function tick() {
                if (hasMoved) {
                    const dx = mouseX - bugX;
                    const dy = mouseY - bugY;
                    
                    bugX += dx * speed;
                    bugY += dy * speed;
                    
                    // Rotate bug to face the target coordinates (offset 90deg since SVG points up)
                    let angle = 0;
                    if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                        angle = (Math.atan2(dy, dx) * 180 / Math.PI) + 90;
                    }
                    
                    bug.style.transform = `translate3d(${bugX}px, ${bugY}px, 0) rotate(${angle}deg)`;
                }
                requestAnimationFrame(tick);
            }
            tick();
        })();
    </script>
</body>
</html>
