<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Hunter - Multi-Language Code Debugger</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: rgba(22, 27, 34, 0.4);
            --bg-active: rgba(33, 38, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f0883e;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #0a0e1a, #1a0a2e, #0a1628, #0a0e1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            will-change: transform;
        }

        .welcome-container {
            max-width: 1000px;
            width: 100%;
            padding: 4rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo-badge {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 20px;
            color: var(--accent-blue);
            box-shadow: var(--shadow);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .welcome-container:hover .logo-badge {
            transform: scale(1.05) rotate(5deg);
            border-color: rgba(88, 166, 255, 0.4);
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.25);
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #58a6ff 10%, #3fb950 50%, #f0883e 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowPulse 3s infinite ease-in-out;
            line-height: 1.2;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(88, 166, 255, 0.1), 0 0 30px rgba(63, 185, 80, 0.05); }
            50% { text-shadow: 0 0 35px rgba(88, 166, 255, 0.4), 0 0 50px rgba(240, 136, 94, 0.25); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.75rem; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            font-weight: 500;
            min-height: 1.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2rem;
            background-color: var(--accent-blue);
            margin-left: 4px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Language Grid Layout */
        .language-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.75rem;
            width: 100%;
            margin-top: 1rem;
        }

        @media (max-width: 900px) {
            .language-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 580px) {
            .language-grid {
                grid-template-columns: 1fr;
            }
        }

        .lang-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.25rem 1.75rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: calc(var(--index) * 100ms);
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .lang-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--lang-color);
            opacity: 0.4;
            transition: var(--transition);
        }

        /* Language specific colors */
        .lang-python { --lang-color: #3776AB; }
        .lang-javascript { --lang-color: #F7DF1E; }
        .lang-java { --lang-color: #007396; }
        .lang-cpp { --lang-color: #00599C; }
        .lang-go { --lang-color: #00ADD8; }
        .lang-rust { --lang-color: #DEA584; }

        .lang-icon {
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            filter: grayscale(15%);
        }

        .lang-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .version-badge {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            transition: var(--transition);
        }

        /* Hover states */
        .lang-card:hover {
            transform: translateY(-8px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.2);
            background-color: var(--bg-active);
            box-shadow: 0 16px 36px var(--shadow-color);
        }

        .lang-card:hover::before {
            opacity: 1;
            height: 6px;
        }

        .lang-card:hover .lang-icon {
            transform: scale(1.15) rotate(3deg);
            filter: grayscale(0%);
        }

        .lang-card:hover .lang-name {
            color: #ffffff;
        }

        .lang-card:hover .version-badge {
            border-color: var(--lang-color);
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.08);
        }

        /* Shadow glow variables */
        .lang-python:hover { --shadow-color: rgba(55, 118, 171, 0.25); }
        .lang-javascript:hover { --shadow-color: rgba(247, 223, 30, 0.15); }
        .lang-java:hover { --shadow-color: rgba(0, 115, 150, 0.25); }
        .lang-cpp:hover { --shadow-color: rgba(0, 89, 156, 0.25); }
        .lang-go:hover { --shadow-color: rgba(0, 173, 216, 0.25); }
        .lang-rust:hover { --shadow-color: rgba(222, 165, 132, 0.25); }

        footer {
            margin-top: 3rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .footer-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin-bottom: 0.5rem;
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            width: 100%;
        }

        .gemini-attribution {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            animation: footerPulse 3s infinite ease-in-out;
        }

        @keyframes footerPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; color: var(--accent-blue); }
        }

        .github-link {
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .github-link:hover {
            color: #ffffff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="welcome-container">
        <header>
            <div class="logo-badge">
                <i data-lucide="bug" size="42"></i>
            </div>
            <h1>Bug Hunter</h1>
            <p class="subtitle" id="typing-subtitle"></p>
        </header>

        <div class="language-grid">
            <a href="/debug?lang=python" class="lang-card lang-python" style="--index: 1;">
                <div class="lang-icon">🐍</div>
                <div class="lang-name">Python</div>
                <span class="version-badge">v3.11</span>
            </a>
            
            <a href="/debug?lang=javascript" class="lang-card lang-javascript" style="--index: 2;">
                <div class="lang-icon">🟨</div>
                <div class="lang-name">JavaScript</div>
                <span class="version-badge">ES2023</span>
            </a>
            
            <a href="/debug?lang=java" class="lang-card lang-java" style="--index: 3;">
                <div class="lang-icon">☕</div>
                <div class="lang-name">Java</div>
                <span class="version-badge">SE 21</span>
            </a>

            <a href="/debug?lang=cpp" class="lang-card lang-cpp" style="--index: 4;">
                <div class="lang-icon">🔵</div>
                <div class="lang-name">C++</div>
                <span class="version-badge">C++20</span>
            </a>

            <a href="/debug?lang=go" class="lang-card lang-go" style="--index: 5;">
                <div class="lang-icon">🐹</div>
                <div class="lang-name">Go</div>
                <span class="version-badge">v1.22</span>
            </a>

            <a href="/debug?lang=rust" class="lang-card lang-rust" style="--index: 6;">
                <div class="lang-icon">🦀</div>
                <div class="lang-name">Rust</div>
                <span class="version-badge">v1.78</span>
            </a>
        </div>

        <footer>
            <div class="footer-divider"></div>
            <div class="footer-content">
                <div class="gemini-attribution">
                    <i data-lucide="sparkles" size="14"></i> Powered by Google Gemini API
                </div>
                <a href="https://github.com/DuyQuach103/bug-hunter" target="_blank" rel="noopener" class="github-link" title="View Source on GitHub">
                    <i data-lucide="github" size="18"></i>
                </a>
            </div>
        </footer>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Subtitle Typing Effect
        (function() {
            const text = "Scan. Debug. Optimize. → AI-powered code analysis";
            const el = document.getElementById('typing-subtitle');
            let index = 0;
            function type() {
                if (index < text.length) {
                    el.innerHTML = text.slice(0, index + 1) + '<span class="cursor"></span>';
                    index++;
                    setTimeout(type, 50);
                } else {
                    el.innerHTML = text + '<span class="cursor"></span>';
                }
            }
            setTimeout(type, 700);
        })();

        // Starfield Canvas Animation (Floating particles 50-80, white, varying opacity 0.1-0.5)
        (function() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;
            
            let parallaxX = 0;
            let parallaxY = 0;
            let targetParallaxX = 0;
            let targetParallaxY = 0;
            
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });
            
            window.addEventListener('mousemove', (e) => {
                // Parallax shift calculation
                targetParallaxX = (e.clientX - width / 2) * 0.04;
                targetParallaxY = (e.clientY - height / 2) * 0.04;
            });
            
            class Star {
                constructor() {
                    this.reset();
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                }
                
                reset() {
                    this.x = Math.random() * width;
                    this.y = height + 10;
                    this.size = Math.random() * 2 + 2; // 2px to 4px
                    this.speed = Math.random() * 0.15 + 0.05; // slow drift
                    this.alpha = Math.random() * 0.4 + 0.1; // opacity 0.1 to 0.5
                    this.pulseSpeed = Math.random() * 0.01 + 0.003;
                    this.pulseDir = Math.random() > 0.5 ? 1 : -1;
                }
                
                update() {
                    this.y -= this.speed;
                    
                    // Subtle opacity pulsing
                    this.alpha += this.pulseSpeed * this.pulseDir;
                    if (this.alpha >= 0.5) { this.alpha = 0.5; this.pulseDir = -1; }
                    if (this.alpha <= 0.1) { this.alpha = 0.1; this.pulseDir = 1; }
                    
                    if (this.y < -10) {
                        this.reset();
                    }
                }
                
                draw() {
                    // Apply parallax offsets
                    const xOffset = this.x + parallaxX * (this.size * 0.4);
                    const yOffset = this.y + parallaxY * (this.size * 0.4);
                    
                    ctx.fillStyle = `rgba(230, 237, 243, ${this.alpha})`;
                    ctx.shadowBlur = this.size > 3 ? 4 : 0;
                    ctx.shadowColor = 'rgba(88, 166, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(xOffset, yOffset, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            const numStars = 65; // 50 to 80 particles
            const stars = Array.from({ length: numStars }, () => new Star());
            
            function animate() {
                // Clear screen
                ctx.clearRect(0, 0, width, height);
                
                // Lerp parallax offsets for smooth shifting
                parallaxX += (targetParallaxX - parallaxX) * 0.08;
                parallaxY += (targetParallaxY - parallaxY) * 0.08;
                
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
        })();
    </script>

    <!-- Chasing Bug Cursor Feature -->
    <div class="chasing-bug" id="chasing-bug" style="position: fixed; top: 0; left: 0; width: 24px; height: 24px; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); will-change: transform; transition: opacity 0.3s ease; opacity: 0; display: flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bug" style="filter: drop-shadow(0 0 3px rgba(88,166,255,0.4));"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-4.97 0-9-4.03-9-9 0-4.02 3.24-7.3 7.29-7.97Q11 3 12 3q1 0 1.71.03C17.76 3.7 21 6.98 21 11c0 4.97-4.03 9-9 9Z"/><path d="M12 9v11"/><path d="M18.39 8.81 21.6 7"/><path d="M21 11h-3"/><path d="M18.39 13.19 21.6 15"/><path d="M5.61 8.81 2.4 7"/><path d="M3 11h3"/><path d="M5.61 13.19 2.4 15"/></svg>
    </div>
    
    <script>
        (function() {
            const bug = document.getElementById('chasing-bug');
            let mouseX = 0, mouseY = 0;
            let bugX = 0, bugY = 0;
            let hasMoved = false;
            
            // Chasing speed (0.08 is smooth and creates a nice trailing lag)
            const speed = 0.08;
            
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                if (!hasMoved) {
                    // Position immediately on first move to prevent bug flying from top-left (0,0)
                    bugX = mouseX;
                    bugY = mouseY;
                    bug.style.opacity = '1';
                    hasMoved = true;
                }
            });
            
            function tick() {
                if (hasMoved) {
                    const dx = mouseX - bugX;
                    const dy = mouseY - bugY;
                    
                    bugX += dx * speed;
                    bugY += dy * speed;
                    
                    // Rotate bug to face the target coordinates (offset 90deg since SVG points up)
                    let angle = 0;
                    if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                        angle = (Math.atan2(dy, dx) * 180 / Math.PI) + 90;
                    }
                    
                    bug.style.transform = `translate3d(${bugX}px, ${bugY}px, 0) rotate(${angle}deg)`;
                }
                requestAnimationFrame(tick);
            }
            tick();
        })();
    </script>

    <!-- Background Wandering Pixel-Art Characters -->
    <div id="bg-programmer" style="position: fixed; top: 0; left: 0; width: 40px; height: 40px; pointer-events: none; z-index: 1; opacity: 0.3; will-change: transform;">
        <svg width="40" height="40" viewBox="0 0 8 8" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
            <!-- Blue Cap -->
            <rect x="2" y="0" width="4" height="2" fill="#58a6ff" />
            <rect x="1" y="1" width="6" height="1" fill="#1f6feb" />
            <!-- Face / Skin -->
            <rect x="2" y="2" width="4" height="3" fill="#ffdbac" />
            <!-- Brown Hair -->
            <rect x="1" y="2" width="1" height="2" fill="#8b5a2b" />
            <!-- Glasses -->
            <rect x="3" y="3" width="3" height="1" fill="#000000" />
            <rect x="4" y="3" width="1" height="1" fill="#ffffff" />
            <!-- Shirt -->
            <rect x="2" y="5" width="4" height="2" fill="#161b22" stroke="#30363d" stroke-width="0.5" />
            <!-- Hand holding racket -->
            <rect x="6" y="4" width="1" height="1" fill="#ffdbac" />
            <!-- Racket shaft -->
            <rect x="6" y="3" width="1" height="1" fill="#8b949e" />
            <!-- Racket frame -->
            <rect x="5" y="1" width="3" height="2" fill="none" stroke="#58a6ff" stroke-width="0.5" />
            <!-- Pants -->
            <rect x="2" y="7" width="1" height="1" fill="#8b949e" />
            <rect x="5" y="7" width="1" height="1" fill="#8b949e" />
        </svg>
    </div>

    <div id="bg-bug" style="position: fixed; top: 0; left: 0; width: 20px; height: 20px; pointer-events: none; z-index: 1; opacity: 0.3; will-change: transform;">
        <svg width="20" height="20" viewBox="0 0 8 8" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
            <!-- Legs -->
            <rect x="0" y="2" width="8" height="1" fill="#8b949e" />
            <rect x="0" y="4" width="8" height="1" fill="#8b949e" />
            <rect x="0" y="6" width="8" height="1" fill="#8b949e" />
            <!-- Body -->
            <rect x="2" y="1" width="4" height="6" fill="#347d39" />
            <!-- Gold details -->
            <rect x="3" y="2" width="2" height="4" fill="#d4af37" />
            <!-- Head -->
            <rect x="3" y="0" width="2" height="1" fill="#1b4d3e" />
            <!-- Red eyes -->
            <rect x="2" y="0" width="1" height="1" fill="#f85149" />
            <rect x="5" y="0" width="1" height="1" fill="#f85149" />
        </svg>
    </div>

    <script>
        (function() {
            const pEl = document.getElementById('bg-programmer');
            const bEl = document.getElementById('bg-bug');
            
            let w = window.innerWidth;
            let h = window.innerHeight;
            
            window.addEventListener('resize', () => {
                w = window.innerWidth;
                h = window.innerHeight;
            });
            
            // Bug positions and initial velocities
            let bx = Math.random() * (w - 100) + 50;
            let by = Math.random() * (h - 100) + 50;
            let bvx = (Math.random() - 0.5) * 1.5;
            let bvy = (Math.random() - 0.5) * 1.5;
            
            // Programmer position (starts separated)
            let px = bx - 120;
            let py = by - 120;
            
            const bugSpeedLimit = 1.3;
            const progSpeed = 0.025; // Slow tracking chase delay
            
            let targetTimer = 0;
            
            function animateBG() {
                // 1. Move Bug (Random walk + boundary bouncing)
                bx += bvx;
                by += bvy;
                
                // Screen boundary bouncing
                if (bx < 20) { bx = 20; bvx = Math.abs(bvx); }
                if (bx > w - 20) { bx = w - 20; bvx = -Math.abs(bvx); }
                if (by < 20) { by = 20; bvy = Math.abs(bvy); }
                if (by > h - 20) { by = h - 20; bvy = -Math.abs(bvy); }
                
                // Periodic velocity change (wandering paths)
                targetTimer++;
                if (targetTimer > 100) {
                    targetTimer = 0;
                    bvx += (Math.random() - 0.5) * 0.8;
                    bvy += (Math.random() - 0.5) * 0.8;
                    
                    const speed = Math.sqrt(bvx * bvx + bvy * bvy);
                    if (speed > bugSpeedLimit) {
                        bvx = (bvx / speed) * bugSpeedLimit;
                        bvy = (bvy / speed) * bugSpeedLimit;
                    }
                }
                
                // Sudden sudden bug "dodges" (1% chance per frame)
                if (Math.random() < 0.01) {
                    bvx = (Math.random() - 0.5) * 2.5;
                    bvy = (Math.random() - 0.5) * 2.5;
                }
                
                // 2. Move Programmer (Pursues the bug with a delay)
                const dx = bx - px;
                const dy = by - py;
                
                px += dx * progSpeed;
                py += dy * progSpeed;
                
                // 3. Flip characters to face their movement direction
                const bFlip = bvx < 0 ? -1 : 1;
                const pFlip = dx < 0 ? -1 : 1;
                
                // 4. Update elements
                bEl.style.transform = `translate3d(${bx}px, ${by}px, 0) scaleX(${bFlip})`;
                pEl.style.transform = `translate3d(${px}px, ${py}px, 0) scaleX(${pFlip})`;
                
                requestAnimationFrame(animateBG);
            }
            
            animateBG();
        })();
    </script>
</body>
</html>
